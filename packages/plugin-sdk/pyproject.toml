[project]
name = "laboratree-plugin-sdk"
version = "0.1.0"
description = "Component / registry contracts for Laboratree Labs (plug-in / plug-out)."
requires-python = ">=3.12,<3.13"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["laboratree_sdk"]
